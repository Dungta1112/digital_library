version: '3.8'

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ailibrary-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '123456'
      POSTGRES_DB: ailibrary
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ailibrary-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  # ── MinIO (S3-compatible object storage) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: ailibrary-minio
    restart: unless-stopped
    ports:
      - '9000:9000'   # API
      - '9001:9001'   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  # ── Backend (Node.js/NestJS) ───────────────────────────────
  backend:
    build:
      context: .
    container_name: ailibrary-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
      - ai_service

  # ── AI Service (Python FastAPI) ────────────────────────────
  ai_service:
    build:
      context: ./ai_service
    container_name: ailibrary-ai
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - ./ai_service:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434

volumes:
  pgdata:
  redisdata:
  miniodata:
