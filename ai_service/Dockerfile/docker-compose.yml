version: '3.8'

services:
  # 1. SERVICE BACKEND CHÍNH (NODE.JS / NESTJS)
  backend:
    build:
      context: .
      dockerfile: Dockerfile # Sử dụng Dockerfile ở thư mục gốc của bạn
    container_name: digital_library_backend
    ports:
      - "3000:3000" # Mở port 3000 cho backend (thay đổi nếu dự án dùng port khác)
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@db:5432/library_db # Thay bằng chuỗi kết nối DB
    depends_on:
      - ai_service # Chỉ chạy backend sau khi AI service đã sẵn sàng

  # 2. SERVICE AI (PYTHON FASTAPI)
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile # Sử dụng Dockerfile nằm trong thư mục ai_service
    container_name: digital_library_ai
    ports:
      - "8000:8000" # Mở port 8000 để kiểm tra API Python bốc sách
    volumes:
      - ./ai_service:/app # Mount thư mục để khi sửa code Python không cần build lại docker
      - chroma_data:/app/chroma_db # Giữ lại dữ liệu kho sách đã số hóa không bị mất khi tắt docker
    extra_hosts:
      - "host.docker.internal:host-gateway" # Cấu hình cốt lõi để Python gọi được Ollama ở máy thật
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - ENV=development

  # 3. SERVICE FRONTEND (REACT / NEXT.JS nếu có chạy chung repo)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: digital_library_frontend
    ports:
      - "5173:5173" # Port mặc định của Vite, thay đổi tùy framework của bạn
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000 # Đường dẫn gọi sang Node.js

volumes:
  chroma_data: # Khai báo bộ nhớ lưu trữ riêng cho cơ sở dữ liệu Vector của AI