openapi: 3.0.3
info:
  title: Digital Library Forum Backend API
  version: 0.1.0
  description: REST contract for the digital library, academic forum, study groups, moderation, administration, statistics, and system configuration backend.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: RolePermission
  - name: LibraryDocuments
  - name: LecturerDocuments
  - name: Forum
  - name: StudyGroups
  - name: ContentManagement
  - name: AdminManagement
  - name: Statistics
  - name: SystemConfig
paths:
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201': { description: Account created, content: { application/json: { schema: { $ref: '#/components/schemas/UserResponse' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Log in and receive access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200': { description: Tokens issued, content: { application/json: { schema: { $ref: '#/components/schemas/AuthTokenResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '423': { description: Account locked }
  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200': { description: Tokens refreshed, content: { application/json: { schema: { $ref: '#/components/schemas/AuthTokenResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        '200': { description: Current profile, content: { application/json: { schema: { $ref: '#/components/schemas/UserResponse' } } } }
    patch:
      tags: [Users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200': { description: Profile updated, content: { application/json: { schema: { $ref: '#/components/schemas/UserResponse' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
  /users/me/password:
    patch:
      tags: [Users]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204': { description: Password changed }
        '400': { $ref: '#/components/responses/ValidationError' }
  /roles:
    get:
      tags: [RolePermission]
      summary: List roles
      responses:
        '200': { description: Role list }
  /permissions:
    get:
      tags: [RolePermission]
      summary: List permissions
      responses:
        '200': { description: Permission list }
  /documents:
    get:
      tags: [LibraryDocuments]
      security: []
      summary: Search public or accessible documents
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: categoryId, in: query, schema: { type: string, format: uuid } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        '200': { description: Documents returned, content: { application/json: { schema: { $ref: '#/components/schemas/PagedDocumentResponse' } } } }
  /documents/{documentId}:
    get:
      tags: [LibraryDocuments]
      security: []
      summary: View public or accessible document details
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200': { description: Document details, content: { application/json: { schema: { $ref: '#/components/schemas/DocumentResponse' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /documents/{documentId}/read:
    get:
      tags: [LibraryDocuments]
      summary: Read document online
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200': { description: Read URL or stream metadata }
        '403': { $ref: '#/components/responses/Forbidden' }
  /documents/{documentId}/download:
    get:
      tags: [LibraryDocuments]
      summary: Download document file
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200': { description: File stream }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /documents/{documentId}/favorite:
    post:
      tags: [LibraryDocuments]
      summary: Save document as favorite
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '201': { description: Favorite created }
    delete:
      tags: [LibraryDocuments]
      summary: Remove document from favorites
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '204': { description: Favorite removed }
  /documents/{documentId}/ratings:
    post:
      tags: [LibraryDocuments]
      summary: Rate a document
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateDocumentRequest'
      responses:
        '201': { description: Rating saved }
        '400': { $ref: '#/components/responses/ValidationError' }
  /documents/{documentId}/reports:
    post:
      tags: [LibraryDocuments]
      summary: Report a document violation
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201': { description: Report created }
  /lecturer/documents:
    get:
      tags: [LecturerDocuments]
      summary: List lecturer-owned documents and review status
      responses:
        '200': { description: Lecturer documents }
    post:
      tags: [LecturerDocuments]
      summary: Upload a lecturer document for review
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201': { description: Document created pending review, content: { application/json: { schema: { $ref: '#/components/schemas/DocumentResponse' } } } }
        '400': { $ref: '#/components/responses/ValidationError' }
  /lecturer/documents/{documentId}:
    patch:
      tags: [LecturerDocuments]
      summary: Update own lecturer document
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200': { description: Document updated }
    delete:
      tags: [LecturerDocuments]
      summary: Delete own lecturer document
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '204': { description: Document deleted }
  /lecturer/documents/{documentId}/hide:
    post:
      tags: [LecturerDocuments]
      summary: Hide own document
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200': { description: Document hidden }
  /forum/posts:
    get:
      tags: [Forum]
      security: []
      summary: List forum posts
      responses:
        '200': { description: Forum posts }
    post:
      tags: [Forum]
      summary: Create forum post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateForumPostRequest'
      responses:
        '201': { description: Post created }
  /forum/posts/{postId}:
    get:
      tags: [Forum]
      security: []
      summary: View forum post details
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200': { description: Post details }
    patch:
      tags: [Forum]
      summary: Edit own forum post
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200': { description: Post updated }
    delete:
      tags: [Forum]
      summary: Delete own forum post
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '204': { description: Post deleted }
  /forum/posts/{postId}/comments:
    post:
      tags: [Forum]
      summary: Comment on forum post
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201': { description: Comment created }
  /forum/reports:
    post:
      tags: [Forum]
      summary: Report forum content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateForumReportRequest'
      responses:
        '201': { description: Report created }
  /study-groups:
    get:
      tags: [StudyGroups]
      summary: List joined or discoverable study groups
      responses:
        '200': { description: Study groups }
    post:
      tags: [StudyGroups]
      summary: Create a study group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudyGroupRequest'
      responses:
        '201': { description: Group created }
  /study-groups/{groupId}/join:
    post:
      tags: [StudyGroups]
      summary: Request or join a study group
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '201': { description: Membership request created or membership approved }
  /study-groups/{groupId}/members/{userId}/approve:
    post:
      tags: [StudyGroups]
      summary: Approve group membership request
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: Member approved }
  /study-groups/{groupId}/documents:
    get:
      tags: [StudyGroups]
      summary: List group documents
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200': { description: Group documents }
    post:
      tags: [StudyGroups]
      summary: Share a document with group
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '201': { description: Document shared }
  /study-groups/{groupId}/posts:
    post:
      tags: [StudyGroups]
      summary: Create group post
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '201': { description: Group post created }
  /content/documents/pending:
    get:
      tags: [ContentManagement]
      summary: List documents pending review
      responses:
        '200': { description: Pending documents }
  /content/documents/{documentId}/approve:
    post:
      tags: [ContentManagement]
      summary: Approve pending document
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200': { description: Document approved }
  /content/documents/{documentId}/reject:
    post:
      tags: [ContentManagement]
      summary: Reject pending document with reason
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectDocumentRequest'
      responses:
        '200': { description: Document rejected }
        '400': { $ref: '#/components/responses/ValidationError' }
  /content/forum/posts/{postId}:
    delete:
      tags: [ContentManagement]
      summary: Delete violating forum post
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '204': { description: Post deleted }
  /content/forum/posts/{postId}/lock:
    post:
      tags: [ContentManagement]
      summary: Lock forum topic
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200': { description: Topic locked }
  /content/reports:
    get:
      tags: [ContentManagement]
      summary: List violation reports
      responses:
        '200': { description: Reports }
  /content/reports/{reportId}/handle:
    post:
      tags: [ContentManagement]
      summary: Handle violation report
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HandleReportRequest'
      responses:
        '200': { description: Report handled }
  /admin/users:
    get:
      tags: [AdminManagement]
      summary: Search users
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
      responses:
        '200': { description: Users }
  /admin/users/{userId}:
    get:
      tags: [AdminManagement]
      summary: View account details
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: User details }
    patch:
      tags: [AdminManagement]
      summary: Update account status
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: User updated }
  /admin/users/{userId}/lock:
    post:
      tags: [AdminManagement]
      summary: Lock account
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: Account locked }
  /admin/users/{userId}/unlock:
    post:
      tags: [AdminManagement]
      summary: Unlock account
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200': { description: Account unlocked }
  /admin/users/{userId}/roles:
    put:
      tags: [AdminManagement]
      summary: Replace user roles
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolesRequest'
      responses:
        '200': { description: Roles updated }
  /statistics/overview:
    get:
      tags: [Statistics]
      summary: Get system overview statistics
      responses:
        '200': { description: Statistics overview }
  /system-configs:
    get:
      tags: [SystemConfig]
      summary: List system configurations
      responses:
        '200': { description: Configurations }
    put:
      tags: [SystemConfig]
      summary: Update system configurations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemConfigRequest'
      responses:
        '200': { description: Configurations updated }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    DocumentId: { name: documentId, in: path, required: true, schema: { type: string, format: uuid } }
    PostId: { name: postId, in: path, required: true, schema: { type: string, format: uuid } }
    GroupId: { name: groupId, in: path, required: true, schema: { type: string, format: uuid } }
    UserId: { name: userId, in: path, required: true, schema: { type: string, format: uuid } }
    ReportId: { name: reportId, in: path, required: true, schema: { type: string, format: uuid } }
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Role or ownership permission denied
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, fullName, role]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        fullName: { type: string, minLength: 1, maxLength: 120 }
        role: { type: string, enum: [STUDENT, LECTURER] }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
    AuthTokenResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: '#/components/schemas/UserResponse' }
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        fullName: { type: string }
        status: { type: string }
        roles: { type: array, items: { type: string } }
    UpdateProfileRequest:
      type: object
      properties:
        fullName: { type: string, minLength: 1, maxLength: 120 }
        avatarUrl: { type: string }
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string }
        newPassword: { type: string, minLength: 8 }
    DocumentResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status: { type: string }
        ownerId: { type: string, format: uuid }
    PagedDocumentResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DocumentResponse' }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
    CreateDocumentRequest:
      type: object
      required: [title, file]
      properties:
        title: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string }
        categoryId: { type: string, format: uuid }
        metadata: { type: object }
        file: { type: string, format: binary }
    RateDocumentRequest:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, maxLength: 1000 }
    CreateReportRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 2000 }
    CreateForumPostRequest:
      type: object
      required: [title, content]
      properties:
        title: { type: string, minLength: 1, maxLength: 255 }
        content: { type: string, minLength: 1 }
    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1 }
    CreateForumReportRequest:
      type: object
      required: [targetType, targetId, reason]
      properties:
        targetType: { type: string, enum: [POST, COMMENT] }
        targetId: { type: string, format: uuid }
        reason: { type: string, minLength: 1 }
        description: { type: string }
    CreateStudyGroupRequest:
      type: object
      required: [name, visibility]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string }
        visibility: { type: string, enum: [PUBLIC, REQUEST_TO_JOIN, PRIVATE] }
    RejectDocumentRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 5, maxLength: 1000 }
    HandleReportRequest:
      type: object
      required: [status, resolutionNote]
      properties:
        status: { type: string, enum: [RESOLVED, REJECTED] }
        resolutionNote: { type: string, minLength: 1, maxLength: 2000 }
    AssignRolesRequest:
      type: object
      required: [roleIds]
      properties:
        roleIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
    UpdateSystemConfigRequest:
      type: object
      required: [configs]
      properties:
        configs:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        errors:
          type: array
          items: { type: string }
